name: BongoCat Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set output
        id: vars
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate changelog
        id: create_release
        run: npx changelogithub --draft --name ${{ steps.vars.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  build-app:
    needs: create-release
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install rust target
        run: rustup target add aarch64-apple-darwin

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install front-end dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the app
        run: pnpm tauri build --target aarch64-apple-darwin
        env:
          CI: false
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Fix code signing (ad-hoc resign for macOS Gatekeeper)
        run: |
          APP_PATH="target/aarch64-apple-darwin/release/bundle/macos/BongoCat.app"
          echo "Removing extended attributes..."
          xattr -cr "$APP_PATH" 2>/dev/null || true
          echo "Re-signing with ad-hoc signature..."
          codesign --force --deep --sign - "$APP_PATH" 2>&1
          echo "Verifying signature..."
          codesign -dv "$APP_PATH" 2>&1 || true
          spctl --assess --verbose "$APP_PATH" 2>&1 || true

      - name: Re-package DMG
        run: |
          APP_PATH="target/aarch64-apple-darwin/release/bundle/macos/BongoCat.app"
          DMG_PATH="target/aarch64-apple-darwin/release/bundle/dmg/BongoCat_1.1.1_aarch64.dmg"
          DMG_DIR="target/aarch64-apple-darwin/release/bundle/dmg"
          # Remove old DMG and recreate
          rm -f "$DMG_PATH"
          # Create temp directory for DMG contents
          TMP_DMG=$(mktemp -d)
          cp -R "$APP_PATH" "$TMP_DMG/"
          # Create symbolic link to Applications
          ln -s /Applications "$TMP_DMG/Applications"
          # Re-create DMG
          hdiutil create -volname "BongoCat" -srcfolder "$TMP_DMG" -ov -format UDZO "$DMG_PATH"
          rm -rf "$TMP_DMG"
          echo "DMG recreated at: $DMG_PATH"

      - name: Re-package tar.gz
        run: |
          APP_PATH="target/aarch64-apple-darwin/release/bundle/macos/BongoCat.app"
          TAR_PATH="target/aarch64-apple-darwin/release/bundle/macos/BongoCat.app.tar.gz"
          TAR_DIR="target/aarch64-apple-darwin/release/bundle/macos"
          rm -f "$TAR_PATH"
          cd "$TAR_DIR" && tar czf "BongoCat.app.tar.gz" "BongoCat.app"
          echo "tar.gz recreated at: $TAR_PATH"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: bundle-dmg
          path: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: bundle-tar
          path: target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
          if-no-files-found: error

      - name: Upload .sig
        uses: actions/upload-artifact@v4
        with:
          name: bundle-sig
          path: target/aarch64-apple-darwin/release/bundle/macos/*.sig
          if-no-files-found: warn

  publish-release:
    needs: [create-release, build-app]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN }}
          draft: false
          prerelease: false
          files: bundle-*/*
